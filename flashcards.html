function isKanji(ch) {
  const c = ch.charCodeAt(0);
  return (c >= 0x4E00 && c <= 0x9FFF) || (c >= 0x3400 && c <= 0x4DBF);
}
function kata2hira(s) {
  return s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
}
function extractReadings(r) {
  return r.replace(/\([^)]*\)/g,'').split(/[・·]/)
    .map(p => kata2hira(p.trim())).filter(p => p && p !== '—');
}
function makeRuby(kanji, reading) {
  return `<ruby>${kanji}<rt>${reading}</rt></ruby>`;
}
function alignReading(sentence, reading) {
  // Enumerates every way the kana reading can map onto the sentence,
  // then picks the most natural one (kanji usually read as ~1-2 kana each).
  // This resolves ambiguity like 四月は春です = しがつ|は|はる (not しがつは|る).
  const R = kata2hira(reading);
  const results = [];
  function dfs(si, ri, acc) {
    if (si === sentence.length) {
      if (ri === R.length) results.push(acc.slice());
      return;
    }
    const ch = sentence[si];
    if (!isKanji(ch)) {
      if (ri < R.length && R[ri] === kata2hira(ch)) {
        acc.push({text: ch, kanji: false, reading: R[ri]});
        dfs(si + 1, ri + 1, acc);
        acc.pop();
      }
      return;
    }
    let group = '';
    let j = si;
    while (j < sentence.length && isKanji(sentence[j])) { group += sentence[j]; j++; }
    for (let L = group.length; L <= R.length - ri; L++) {
      acc.push({text: group, kanji: true, reading: R.slice(ri, ri + L)});
      dfs(j, ri + L, acc);
      acc.pop();
    }
  }
  dfs(0, 0, []);
  if (!results.length) return null;
  const score = (aln) => aln.reduce((s, t) =>
    t.kanji ? s + Math.abs(t.reading.length / t.text.length - 1.5) : s, 0);
  const kanjiLen = (aln) => aln.reduce((s, t) => t.kanji ? s + t.reading.length : s, 0);
  results.sort((a, b) => (score(a) - score(b)) || (kanjiLen(b) - kanjiLen(a)));
  return results[0];
}

function formatWithFurigana(sentence, fullReading, targetKanji, cardReading, color) {
  const possibleReadings = extractReadings(cardReading);
  const breaks = new Set(phraseBreaks[sentence] || []);
  const tokens = alignReading(sentence, fullReading);
  if (!tokens) return sentence; // safety net: never crash the card
  const target = (t) => `<span style="color:${color};font-weight:700">${t}</span>`;
  const result = [];
  let pos = 0;
  for (const t of tokens) {
    if (breaks.has(pos)) result.push('<wbr>');
    pos += t.text.length;
    if (!t.kanji) { result.push(t.text + '\u2060'); continue; }
    const group = t.text, groupReading = t.reading;
    const targetIdx = group.indexOf(targetKanji);
    if (targetIdx < 0) {
      // Context word: ruby over the whole group
      result.push(makeRuby(group, groupReading));
    } else if (group.length === 1) {
      // Only the target kanji: colored, reading hidden (that's the quiz!)
      result.push(target(group));
    } else {
      // Mixed group: find the target's reading inside the group reading,
      // also trying gemination variants (e.g. ホク -> ほっ for 北海道)
      let trStart = -1, trLen = 0;
      outer:
      for (const pr of possibleReadings) {
        const variants = [pr];
        if (pr.length >= 2) variants.push(pr.slice(0, -1) + 'っ');
        for (const v of variants) {
          const idx = groupReading.indexOf(v);
          if (idx >= 0) {
            trStart = idx; trLen = v.length;
            // extend over a following っ (e.g. がっ for 学校 when matched as が)
            if (groupReading[trStart + trLen] === 'っ' &&
                (targetIdx + 1 < group.length)) trLen++;
            break outer;
          }
        }
      }
      if (trStart >= 0) {
        const bk = group.slice(0, targetIdx);
        const ak = group.slice(targetIdx + 1);
        const br = groupReading.slice(0, trStart);
        const ar = groupReading.slice(trStart + trLen);
        if (bk) result.push(makeRuby(bk, br));
        const afterRuby = ak ? makeRuby(ak, ar) : '';
        result.push(`<span style="white-space:nowrap">${target(targetKanji)}${afterRuby}</span>`);
      } else {
        // Special reading (e.g. 今年 = ことし): show the whole word's reading,
        // still highlighting the target kanji inside it
        const base = group.split('').map(c => c === targetKanji ? target(c) : c).join('');
        result.push(`<ruby>${base}<rt>${groupReading}</rt></ruby>`);
      }
    }
  }
  return result.join('');
}

function render() {
  const ch = kanjiData[currentChapter];
  const color = colors[currentChapter];
  const card = ch.cards[currentIndex];
  const isKun = card.type === 'kun';

  document.getElementById("chapterGrid").innerHTML = Object.keys(kanjiData).map(k =>
    `<button class="chapter-btn" onclick="changeChapter('${k}')"
      style="background:${k===currentChapter?colors[k]:'#fff'};color:${k===currentChapter?'#fff':colors[k]};border-color:${colors[k]}">
      ${k}章</button>`).join("");

  document.getElementById("chapterTitle").innerHTML =
    `<span style="font-size:18px;font-weight:700;color:${color}">${currentChapter}章</span>
     <span style="font-size:18px;font-weight:700;color:#2d2d2d;margin-left:8px">${ch.title}</span>
     <span style="font-size:14px;color:#aaa;margin-left:8px">${ch.titleEn}</span>`;

  document.getElementById("prevBtn").style.background = color;
  document.getElementById("nextBtn").style.background = color;

  const displayHtml = formatWithFurigana(card.example, card.exR, card.kanji, card.reading, color);

  document.getElementById("cardFront").style.border = `3px solid ${color}`;
  document.getElementById("cardFront").style.background = "#fff";
  document.getElementById("cardFront").innerHTML =
    `<div class="sentence-display">${displayHtml}</div>
     <span class="type-badge ${isKun?'badge-kun':'badge-on'}">${isKun?'Kun 訓':'On 音'}</span>
     <div class="flip-hint">Tap to check the reading ↩</div>`;

  document.getElementById("cardBack").style.background = color;
  document.getElementById("cardBack").innerHTML =
    `<div class="reading-display">${withBreaks(card.exR)}</div>
     <div class="divider"></div>
     <div class="readings"><span class="pill">${isKun?'Kun':'On'}: ${card.reading}</span></div>
     <div class="meaning">${card.meaning}</div>
     <div class="ex-en">${card.exE}</div>`;

  document.getElementById("flipInner").className = "flip-inner" + (isFlipped?" flipped":"");

  const total = ch.cards.length;
  document.getElementById("progressText").textContent = `${currentIndex+1} / ${total}`;
  document.getElementById("dots").innerHTML = ch.cards.map((c,i) =>
    `<div class="dot${i===currentIndex?' active':''}"
      style="${i===currentIndex?'background:'+color+';width:18px':'background:#ddd'}"
      onclick="jumpTo(${i})"></div>`).join("");

  const btn = document.getElementById("toggleBtn");
  btn.textContent = showingList ? "Hide list ▲" : "View chapter kanji ▼";
  btn.style.border = `1px solid ${color}`;
  btn.style.color = color;

  document.getElementById("kanjiGrid").style.display = showingList?"flex":"none";
  document.getElementById("kanjiGrid").innerHTML = ch.kanji.map((k,i) => {
    const firstIdx = ch.cards.findIndex(c => c.kanji===k);
    const isCur = ch.cards[currentIndex]&&ch.cards[currentIndex].kanji===k;
    return `<div class="kanji-tile"
      style="background:${isCur?color:'#fff'};color:${isCur?'#fff':color};border-color:${color}"
      onclick="jumpTo(${firstIdx});toggleList()">${k}</div>`;
  }).join("");
}

function changeChapter(ch) { currentChapter=ch; currentIndex=0; isFlipped=false; showingList=false; render(); }
function navigate(dir) { const len=kanjiData[currentChapter].cards.length; currentIndex=(currentIndex+dir+len)%len; isFlipped=false; render(); }
function flipCard() { isFlipped=!isFlipped; document.getElementById("flipInner").className="flip-inner"+(isFlipped?" flipped":""); }
function jumpTo(i) { currentIndex=i; isFlipped=false; render(); }
function toggleList() { showingList=!showingList; render(); }
render();
</script>
</body>
</html>
