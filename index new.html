<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your First Kanji — Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One&display=swap" rel="stylesheet">
<style>
  :root { --text:#2d2d2d; --grid:#a8caf0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f7f3ee; font-family:'Klee One','Yu Mincho',serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; user-select:none; }

  .header { height:50px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; flex-shrink:0; transition:background 0.3s; }
  .header-title { font-size:25px; color:#fff; font-weight:700; letter-spacing:1px; }
  .header-nav { display:flex; align-items:center; gap:8px; }
  .nav-btn { background:rgba(255,255,255,0.2); border:none; color:#fff; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:22px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .nav-btn:hover { background:rgba(255,255,255,0.38); }
  .home-btn { background:rgba(255,255,255,0.2); border:none; color:#fff; padding:4px 12px; border-radius:14px; cursor:pointer; font-size:15px; font-family:inherit; transition:background 0.15s; }
  .home-btn:hover { background:rgba(255,255,255,0.38); }
  .slide-counter { font-size:20px; color:rgba(255,255,255,0.8); min-width:60px; text-align:center; }

  .screen { display:none; flex:1; flex-direction:column; }
  .screen.active { display:flex; }

  /* Chapter select */
  .ch-select { align-items:center; justify-content:center; gap:12px; padding:20px 32px; }
  .ch-select-title { font-size:32px; color:#2d2d2d; font-weight:700; }
  .ch-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:760px; width:100%; }
  .ch-card { border-radius:12px; padding:10px 8px; text-align:center; cursor:pointer; border:2px solid transparent; transition:transform 0.15s,opacity 0.15s; }
  .ch-card:hover { transform:translateY(-2px); opacity:0.88; }
  .ch-num { display:block; font-size:14px; color:#fff; opacity:0.8; }
  .ch-name { display:block; font-size:18px; color:#fff; font-weight:700; margin-top:2px; }
  .ch-en { display:block; font-size:13px; color:rgba(255,255,255,0.65); margin-top:2px; }

  /* Slides */
  .slide { display:none; flex:1; }
  .slide.active { display:flex; }

  .title-slide { flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .title-main { font-size:85px; font-weight:700; }
  .title-en { font-size:35px; color:#777; font-family:sans-serif; }
  .title-count { font-size:22px; color:#aaa; font-family:sans-serif; }

  .kanji-slide { flex-direction:row; }
  .left-panel { width:44%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:16px; }
  .taji-outer { cursor:pointer; position:relative; }
  .stroke-info { text-align:center; }
  .stroke-counter { font-size:24px; font-weight:700; }
  .stroke-hint { font-size:18px; color:#bbb; margin-top:3px; font-family:sans-serif; }
  .right-panel { width:56%; display:flex; flex-direction:column; justify-content:center; padding:32px 40px; gap:14px; border-left:1px solid #ddd; }
  .kanji-display { font-size:102px; color:var(--text); line-height:1; font-family:'Klee One',serif; }
  .readings { display:flex; gap:8px; flex-wrap:wrap; }
  .pill { border-radius:20px; padding:4px 14px; font-size:21px; font-weight:700; font-family:'Klee One',serif; }
  .pill-kun { background:#eaf0f8; }
  .pill-on  { background:#e5f2e5; color:#3a7a3a; }
  .meaning { font-size:38px; color:var(--text); font-weight:700; font-family:sans-serif; }
  .divider { width:100%; height:1px; background:#e0e0e0; }
  .ex-jp      { font-size:31px; color:var(--text); font-family:'Klee One',serif; word-break:keep-all; overflow-wrap:break-word; }
  .ex-reading { font-size:20px; color:#999; font-family:'Klee One',serif; word-break:keep-all; overflow-wrap:break-word; }
  .ex-en      { font-size:21px; color:#777; font-style:italic; font-family:sans-serif; }
  .sp, .demo-sp { fill:none; stroke:#1a1a1a; stroke-width:3.5; stroke-linecap:round; stroke-linejoin:round; opacity:0; }

  .summary-slide { flex-direction:column; align-items:center; justify-content:center; padding:28px; gap:20px; }
  .summary-title { font-size:32px; font-weight:700; }
  .summary-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; max-width:800px; width:100%; }
  .summary-card { background:#fff; border-radius:10px; padding:8px 4px; text-align:center; border:2px solid; }
  .s-kanji { display:block; font-size:45px; font-family:'Klee One',serif; color:var(--text); }
  .s-kun   { display:block; font-size:16px; color:#888; font-family:'Klee One',serif; margin-top:1px; }
  .s-on    { display:block; font-size:16px; font-family:'Klee One',serif; margin-top:1px; }

  /* ── Intro slides ── */
  .intro-slide { flex-direction:column; align-items:center; justify-content:center; padding:28px 48px; gap:18px; background:#fff; }
  .intro-heading { text-align:center; }
  .intro-title { font-size:45px; font-weight:700; color:#3D4A5C; }
  .intro-ja { font-size:30px; font-weight:400; color:#bbb; margin-left:10px; }
  .intro-sub { font-size:22px; color:#888; font-family:sans-serif; margin-top:6px; }
  .kanji-ex-row { display:flex; gap:14px; justify-content:center; }
  .kanji-ex-card { background:#f0f4fa; border-radius:14px; padding:14px 18px; text-align:center; min-width:95px; }
  .big-k { display:block; font-size:72px; font-family:'Klee One',serif; color:#2d2d2d; line-height:1.1; }
  .k-read { display:block; font-size:28px; font-family:'Klee One',serif; margin-top:4px; }
  .k-read.kun { color:#4A6FA5; }
  .k-read.on  { color:#3a7a3a; }
  .k-meaning-txt { display:block; font-size:19px; color:#888; font-family:sans-serif; margin-top:3px; }
  .intro-note { font-size:21px; color:#888; font-family:sans-serif; text-align:center; }
  .intro-body { font-size:26px; color:#2d2d2d; line-height:1.9; text-align:center; max-width:680px; }
  .cmp-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:540px; width:100%; }
  .cmp-hdr { text-align:center; font-size:22px; font-weight:700; padding:8px 12px; border-radius:8px; }
  .cmp-cell { padding:11px 14px; border-radius:10px; font-size:26px; font-family:'Klee One',serif; text-align:center; line-height:1.6; }
  .cmp-cell.kun { background:#eaf0f8; color:#4A6FA5; }
  .cmp-cell.on  { background:#e5f2e5; color:#3a7a3a; }
  .sc-row { display:flex; gap:12px; justify-content:center; }
  .sc-card { background:#f0f4fa; border-radius:12px; padding:12px 14px; text-align:center; min-width:82px; }
  .sc-count { display:block; font-size:20px; color:#3D4A5C; font-weight:700; font-family:sans-serif; margin-top:4px; }
  .rule-box { display:flex; align-items:center; gap:16px; background:#f0f4fa; border-radius:12px; padding:12px 20px; width:340px; }
  .rule-arrow { font-size:38px; min-width:36px; text-align:center; }
  .rule-text strong { font-size:25px; color:#2d2d2d; display:block; }
  .rule-text span { font-size:19px; color:#888; font-family:sans-serif; }
  @keyframes bounceD2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }
  @keyframes bounceR2 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(7px)} }
  .anim-d2 { animation:bounceD2 1s ease-in-out infinite; display:inline-block; }
  .anim-r2 { animation:bounceR2 1s ease-in-out infinite; display:inline-block; animation-delay:.3s; }
  @keyframes okFade2 { 0%{opacity:0;transform:translateX(-3px)} 12%{opacity:1;transform:translateX(0)} 80%{opacity:1} 100%{opacity:0;transform:translateX(3px)} }
</style>
</head>
<body>

<div class="header" id="mainHeader" style="background:#3D4A5C">
  <div class="header-title" id="headerTitle">Your First Kanji</div>
  <div class="header-nav">
    <button class="home-btn" id="homeBtn" onclick="goHome()" style="display:none">☰ 章選択</button>
    <button class="nav-btn" id="prevBtn" onclick="prevSlide()" style="display:none">‹</button>
    <span class="slide-counter" id="slideCounter" style="display:none"></span>
    <button class="nav-btn" id="nextBtn" onclick="nextSlide()" style="display:none">›</button>
  </div>
</div>

<!-- Chapter selection -->
<div class="screen ch-select" id="screenHome">
  <div class="ch-select-title" style="font-size:40px;">Your First Kanji — Choose a Chapter</div>
  <div class="ch-grid" id="chGrid"></div>
</div>

<!-- Slides -->
<div class="screen" id="screenSlides">
  <div class="slide intro-slide" id="slide-intro"></div>
  <div class="slide title-slide" id="slide-title">
    <div class="title-main" id="titleMain"></div>
    <div class="title-en" id="titleEn"></div>
    <div class="title-count" id="titleCount"></div>
  </div>
  <div class="slide kanji-slide" id="slide-kanji">
    <div class="left-panel">
      <div class="taji-outer" onclick="handleStrokeClick()">
        <svg id="kanji-svg" viewBox="0 0 109 109" width="340" height="340">
          <rect x="1" y="1" width="107" height="107" fill="#fff" stroke="#a8caf0" stroke-width="1.5" rx="2"/>
          <line x1="54.5" y1="1" x2="54.5" y2="108" stroke="#a8caf0" stroke-width="1" stroke-dasharray="4,4"/>
          <line x1="1" y1="54.5" x2="108" y2="54.5" stroke="#a8caf0" stroke-width="1" stroke-dasharray="4,4"/>
          <g id="stroke-group"></g>
        </svg>
      </div>
      <div class="stroke-info">
        <div class="stroke-counter" id="stroke-counter">0 / — 画</div>
        <div class="stroke-hint">クリックで次の画へ</div>
      </div>
    </div>
    <div class="right-panel" id="right-panel"></div>
  </div>
  <div class="slide summary-slide" id="slide-summary">
    <div class="summary-title" id="summaryTitle"></div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>
</div>

let currentChIdx = -1;
let currentSlide = 0; // 0=title, 1..n=kanji, n+1=summary
let strokeIdx = 0;

// Build chapter grid
const chGrid = document.getElementById('chGrid');
// はじめに banner
const banner = document.createElement('div');
banner.style.cssText = 'cursor:pointer;background:#3D4A5C;border-radius:14px;padding:14px 40px;color:#fff;text-align:center;max-width:760px;width:100%;transition:opacity 0.15s;margin-bottom:4px;';
banner.onmouseover = () => banner.style.opacity='0.85';
banner.onmouseout  = () => banner.style.opacity='1';
banner.innerHTML = '<div style="font-size:15px;opacity:0.6;letter-spacing:2px;font-family:sans-serif">START HERE</div><div style="font-size:25px;font-weight:700;margin-top:2px">はじめに — Introduction to Kanji</div>';
banner.onclick = startIntro;
chGrid.parentNode.insertBefore(banner, chGrid);

chapters.forEach((ch, i) => {
  const card = document.createElement('div');
  card.className = 'ch-card';
  card.style.background = ch.color;
  card.innerHTML = `<span class="ch-num">${ch.num}章</span><span class="ch-name">${ch.title}</span><span class="ch-en">${ch.titleEn}</span>`;
  card.onclick = () => startChapter(i);
  chGrid.appendChild(card);
});

function goHome() {
  clearIntroTimers(); isIntroMode = false;
  document.getElementById('screenHome').classList.add('active');
  document.getElementById('screenSlides').classList.remove('active');
  document.getElementById('homeBtn').style.display = 'none';
  document.getElementById('prevBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('slideCounter').style.display = 'none';
  document.getElementById('mainHeader').style.background = '#3D4A5C';
  document.getElementById('headerTitle').textContent = 'Your First Kanji';
  currentChIdx = -1;
}

function startChapter(chIdx) {
  currentChIdx = chIdx;
  currentSlide = 0;
  const ch = chapters[chIdx];
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenSlides').classList.add('active');
  document.getElementById('homeBtn').style.display = '';
  document.getElementById('prevBtn').style.display = '';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('slideCounter').style.display = '';
  document.getElementById('mainHeader').style.background = ch.color;
  // stroke-counter color
  document.getElementById('stroke-counter').style.color = ch.color;
  showCurrentSlide();
}

function totalSlides() {
  if (currentChIdx < 0) return 0;
  return 1 + chapters[currentChIdx].kanji.length + 1;
}

function showCurrentSlide() {
  const ch = chapters[currentChIdx];
  const total = totalSlides();
  document.getElementById('slideCounter').textContent = `${currentSlide+1} / ${total}`;
  // pill-kun color
  document.querySelectorAll('.pill-kun').forEach(p => { p.style.background = ch.color+'22'; p.style.color = ch.color; });

  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  strokeIdx = 0;

  if (currentSlide === 0) {
    // Title
    document.getElementById('headerTitle').textContent = `${ch.num}章 ${ch.title}`;
    document.getElementById('titleMain').textContent = `${ch.num}章 ${ch.title}`;
    document.getElementById('titleMain').style.color = ch.color;
    document.getElementById('titleEn').textContent = ch.titleEn;
    document.getElementById('titleCount').textContent = `${ch.kanji.length} kanji`;
    document.getElementById('slide-title').style.background = ch.color+'18';
    document.getElementById('slide-title').classList.add('active');
  } else if (currentSlide === total - 1) {
    // Summary
    document.getElementById('headerTitle').textContent = `${ch.num}章 まとめ`;
    document.getElementById('summaryTitle').textContent = `${ch.num}章 ${ch.title} — まとめ`;
    document.getElementById('summaryTitle').style.color = ch.color;
    const grid = document.getElementById('summaryGrid');
    grid.innerHTML = '';
    ch.kanji.forEach(k => {
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.style.borderColor = ch.color;
      card.innerHTML = `<span class="s-kanji">${k.char}</span>${k.kun!=='—'?`<span class="s-kun">${k.kun}</span>`:''} <span class="s-on" style="color:${ch.color}">${k.on}</span>`;
      grid.appendChild(card);
    });
    document.getElementById('slide-summary').classList.add('active');
  } else {
    // Kanji
    const ki = currentSlide - 1;
    const k = ch.kanji[ki];
    document.getElementById('headerTitle').textContent = `${k.char}　(${ki+1} / ${ch.kanji.length})`;
    // Stroke SVG
    document.getElementById('stroke-group').innerHTML = k.strokes.map((d,i)=>
      `<path class="sp" id="sp-${i}" d="${d}"/>`
    ).join('');
    document.getElementById('stroke-counter').textContent = `0 / ${k.strokes.length} 画`;
    // Right panel
    document.getElementById('right-panel').innerHTML = `
      <div class="kanji-display">${k.char}</div>
      <div class="readings">
        ${k.kun!=='—'?`<span class="pill pill-kun" style="background:${ch.color}22;color:${ch.color}">Kun: ${k.kun}</span>`:''}
        <span class="pill pill-on">On: ${k.on}</span>
      </div>
      <div class="meaning">${k.meaning}</div>
      <div class="divider"></div>
      ${k.ex_kun ? `<span class="ex-label-pill" style="background:${ch.color}33;color:${ch.color}">Kun 訓</span>
      <div class="ex-jp">${k.ex_kun}</div>
      <div class="ex-reading">${k.exR_kun}</div>
      <div class="ex-en">${k.exE_kun}</div>` : ''}
      ${k.ex_on ? `<span class="ex-label-pill" style="background:#55555522;color:#666">On 音</span>
      <div class="ex-jp">${k.ex_on}</div>
      <div class="ex-reading">${k.exR_on}</div>
      <div class="ex-en">${k.exE_on}</div>` : ''}
    `;
    document.getElementById('slide-kanji').classList.add('active');
  }
}

function handleStrokeClick() {
  if (currentChIdx < 0 || currentSlide === 0 || currentSlide === totalSlides()-1) return;
  const k = chapters[currentChIdx].kanji[currentSlide-1];
  if (strokeIdx >= k.strokes.length) return;
  const path = document.getElementById(`sp-${strokeIdx}`);
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.style.opacity = '1';
  path.getBoundingClientRect();
  path.style.transition = 'stroke-dashoffset 0.5s ease';
  path.style.strokeDashoffset = '0';
  strokeIdx++;
  document.getElementById('stroke-counter').textContent = `${strokeIdx} / ${k.strokes.length} 画`;
}

function nextSlide() {
  if (isIntroMode) { if (introSlideIdx < introSlides.length-1) { introSlideIdx++; showIntroSlide(); } }
  else { if (currentSlide < totalSlides()-1) { currentSlide++; showCurrentSlide(); } }
}
function prevSlide() {
  if (isIntroMode) { if (introSlideIdx > 0) { introSlideIdx--; showIntroSlide(); } }
  else { if (currentSlide > 0) { currentSlide--; showCurrentSlide(); } }
}

document.addEventListener('keydown', e => {
  if (currentChIdx < 0) return;
  if (e.key === 'ArrowRight') nextSlide();
  else if (e.key === 'ArrowLeft') prevSlide();
  else if (e.key === ' ') {
    e.preventDefault();
    if (!isIntroMode && currentSlide > 0 && currentSlide < totalSlides()-1) {
      const k = chapters[currentChIdx].kanji[currentSlide-1];
      if (strokeIdx < k.strokes.length) { handleStrokeClick(); return; }
    }
    nextSlide();
  }
});

function startIntro() {
  isIntroMode = true;
  introSlideIdx = 0;
  currentChIdx = -1;
  document.getElementById('screenHome').classList.remove('active');
  document.getElementById('screenSlides').classList.add('active');
  document.getElementById('homeBtn').style.display = '';
  document.getElementById('prevBtn').style.display = '';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('slideCounter').style.display = '';
  document.getElementById('mainHeader').style.background = INTRO_COLOR;
  showIntroSlide();
}

function showIntroSlide() {
  clearIntroTimers();
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.getElementById('headerTitle').textContent = 'はじめに (' + (introSlideIdx+1) + ' / ' + introSlides.length + ')';
  document.getElementById('slideCounter').textContent = (introSlideIdx+1) + ' / ' + introSlides.length;
  const el = document.getElementById('slide-intro');
  el.innerHTML = introSlides[introSlideIdx];
  el.classList.add('active');
  Object.keys(demoState).forEach(k => demoState[k]=0);
  if (introSlideIdx === 4) {
    const f1 = ['ます','た','ない','て'];
    const f2 = ['べます','べた','べない','べて'];
    let i = 0;
    const t = setInterval(() => {
      const e1 = document.getElementById('okuri1');
      const e2 = document.getElementById('okuri2');
      if (!e1 || !e2) { clearInterval(t); return; }
      i = (i+1) % f1.length;
      [e1,e2].forEach((el,j) => {
        el.style.animation = 'none'; el.offsetHeight;
        el.textContent = [f1,f2][j][i];
        el.style.animation = 'okFade2 1.4s ease';
      });
    }, 1700);
    introTimers.push(t);
  }
}

const demoState = {};
function advanceDemoStroke(svgId, counterId) {
  if (!demoState[svgId]) demoState[svgId] = 0;
  const paths = document.querySelectorAll('#' + svgId + ' .demo-sp');
  const idx = demoState[svgId];
  if (idx >= paths.length) return;
  const path = paths[idx];
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.style.opacity = '1';
  path.getBoundingClientRect();
  path.style.transition = 'stroke-dashoffset 0.5s ease';
  path.style.strokeDashoffset = '0';
  demoState[svgId] = idx + 1;
  const counter = document.getElementById(counterId);
  if (counter) counter.textContent = (idx+1) + ' / ' + paths.length + ' 画';
}
