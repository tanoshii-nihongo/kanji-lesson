<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your First Kanji</title>
<link href="https://fonts.googleapis.com/css2?family=Klee+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; background:#f7f3ee; font-family:'Klee One','Yu Mincho',serif; padding:20px; }
  h1 { font-size:22px; font-weight:800; color:#2d2d2d; letter-spacing:2px; }
  .subtitle { color:#888; font-size:13px; margin-top:4px; }
  .header { text-align:center; margin-bottom:24px; }
  .chapter-grid { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:600px; margin:0 auto 28px; }
  .chapter-btn { border:2px solid transparent; border-radius:10px; padding:6px 12px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:600; transition:all 0.2s; background:#fff; }
  .chapter-btn:hover { opacity:0.85; transform:translateY(-1px); }
  .chapter-title { text-align:center; margin-bottom:20px; }
  .flip-area { display:flex; flex-direction:column; align-items:center; gap:20px; }
  .card-row { display:flex; align-items:center; gap:16px; }
  .flip-card { perspective:1200px; width:340px; height:340px; cursor:pointer; }
  @media(max-width:480px) { .flip-card { width:280px; height:300px; } }
  .flip-inner { position:relative; width:100%; height:100%; transition:transform 0.55s cubic-bezier(.4,0,.2,1); transform-style:preserve-3d; }
  .flip-inner.flipped { transform:rotateY(180deg); }
  .flip-front, .flip-back { position:absolute; width:100%; height:100%; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 8px 32px rgba(0,0,0,0.12); }
  .flip-back { transform:rotateY(180deg); padding:20px 24px; gap:10px; }
  .sentence-display { font-size:26px; font-family:'Klee One',serif; color:#1a1a1a; text-align:center; padding:0 20px; line-height:2.8; }
  .type-badge { font-size:13px; font-weight:700; padding:3px 12px; border-radius:12px; margin-top:10px; font-family:sans-serif; }
  .badge-kun { background:#eaf0f8; color:#4A6FA5; }
  .badge-on  { background:#e5f2e5; color:#3a7a3a; }
  .flip-hint { color:#bbb; font-size:13px; margin-top:8px; }
  .readings { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .pill { display:inline-block; border-radius:20px; padding:5px 16px; font-size:18px; font-weight:600; background:rgba(255,255,255,0.2); color:#fff; font-family:'Klee One',serif; }
  .meaning { font-size:22px; font-weight:800; color:#fff; text-align:center; }
  .reading-display { font-size:22px; font-family:'Klee One',serif; color:#fff; text-align:center; padding:0 16px; line-height:1.5; font-weight:600; }
  .divider { width:60px; height:2px; background:rgba(255,255,255,0.3); border-radius:2px; }
  .ex-en { font-size:13px; color:rgba(255,255,255,0.85); font-style:italic; text-align:center; }
  .nav-btn { border:none; border-radius:50%; width:44px; height:44px; font-size:22px; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; }
  .nav-btn:hover { transform:scale(1.1); }
  .progress { display:flex; align-items:center; gap:12px; }
  .progress-text { color:#888; font-size:14px; }
  .dots { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; max-width:300px; }
  .dot { height:8px; border-radius:4px; cursor:pointer; transition:all 0.2s; background:#ddd; width:8px; }
  .dot.active { width:18px; }
  .toggle-btn { background:none; border-radius:8px; padding:6px 18px; cursor:pointer; font-size:13px; font-family:inherit; transition:all 0.2s; }
  .toggle-btn:hover { opacity:0.75; }
  .kanji-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:500px; }
  .kanji-tile { border-radius:12px; padding:8px 14px; cursor:pointer; font-size:22px; font-weight:700; transition:all 0.15s; border:2px solid; font-family:'Klee One',serif; }
  .kanji-tile:hover { transform:scale(1.05); }

  rt { font-size:0.5em; color:#aaa; font-family:'Klee One',serif; }
</style>
</head>
<body>
<div class="header">
  <h1>Your First Kanji</h1>
  <p class="subtitle">Kanji Flashcards</p>
</div>
<div class="chapter-grid" id="chapterGrid"></div>
<div class="chapter-title" id="chapterTitle"></div>
<div class="flip-area">
  <div class="card-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8249;</button>
    <div class="flip-card" id="flipCard" onclick="flipCard()">
      <div class="flip-inner" id="flipInner">
        <div class="flip-front" id="cardFront"></div>
        <div class="flip-back" id="cardBack"></div>
      </div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8250;</button>
  </div>
  <div class="progress">
    <span class="progress-text" id="progressText"></span>
    <div class="dots" id="dots"></div>
  </div>
  <button class="toggle-btn" id="toggleBtn" onclick="toggleList()"></button>
  <div class="kanji-grid" id="kanjiGrid" style="display:none"></div>
</div>
<script>

,"exR":"ななつあります。","exE":"There are seven.","display":"★七つ★あります。"},{"kanji":"七","type":"on","reading":"シチ","meaning":"seven","example":"七月は夏です。","exR":"しちがつはなつです。","exE":"July is summer.","display":"★七★がつはなつです。"},{"kanji":"八","type":"kun","reading":"や(っつ)","meaning":"eight","example":"八つ選んでください。","exR":"やっつえらんでください。","exE":"Please choose eight.","display":"★八つ★えらんでください。"},{"kanji":"八","type":"on","reading":"ハチ","meaning":"eight","example":"八時に寝ます。","exR":"はちじにねます。","exE":"I go to sleep at eight.","display":"★八★じにねます。"},{"kanji":"九","type":"kun","reading":"ここの(つ)","meaning":"nine","example":"九つあります。","exR":"ここのつあります。","exE":"There are nine.","display":"★九つ★あります。"},{"kanji":"九","type":"on","reading":"ク・キュウ","meaning":"nine","example":"九月に日本へ行きます。","exR":"くがつににほんへいきます。","exE":"I'm going to Japan in September.","display":"★九★がつににほんへいきます。"},{"kanji":"十","type":"kun","reading":"とお","meaning":"ten","example":"十ほどあります。","exR":"とおほどあります。","exE":"There are about ten.","display":"★十★ほどあります。"},{"kanji":"十","type":"on","reading":"ジュウ","meaning":"ten","example":"十時に会いましょう。","exR":"じゅうじにあいましょう。","exE":"Let's meet at ten o'clock.","display":"★十★じにあいましょう。"},{"kanji":"百","type":"on","reading":"ヒャク","meaning":"hundred","example":"百円です。","exR":"ひゃくえんです。","exE":"It's 100 yen.","display":"★百★えんです。"},{"kanji":"千","type":"on","reading":"セン","meaning":"thousand","example":"千円ください。","exR":"せんえんください。","exE":"Please give me 1,000 yen.","display":"★千★えんください。"},{"kanji":"万","type":"on","reading":"マン","meaning":"ten thousand","example":"一万円です。","exR":"いちまんえんです。","exE":"It's 10,000 yen.","display":"いち★万★えんです。"},{"kanji":"円","type":"kun","reading":"まる","meaning":"yen / circle","example":"円い形が好きです。","exR":"まるいかたちがすきです。","exE":"I like round shapes.","display":"★円★いかたちがすきです。"},{"kanji":"円","type":"on","reading":"エン","meaning":"yen / circle","example":"これは五百円です。","exR":"これはごひゃくえんです。","exE":"This is 500 yen.","display":"これはごひゃく★円★です。"}]},"2":{"title":"カレンダー","titleEn":"Calendar","kanji":["月","火","水","木","金","土","日","年"],"cards":[{"kanji":"月","type":"kun","reading":"つき","meaning":"moon / month","example":"月がきれいです。","exR":"つきがきれいです。","exE":"The moon is beautiful.","display":"★月★がきれいです。"},{"kanji":"月","type":"on","reading":"ゲツ・ガツ","meaning":"moon / month","example":"月曜日に来てください。","exR":"げつようびにきてください。","exE":"Please come on Monday.","display":"★月★ようびにきてください。"},{"kanji":"火","type":"kun","reading":"ひ","meaning":"fire / Tuesday","example":"火はあついです。","exR":"ひはあついです。","exE":"The fire is hot.","display":"★火★はあついです。"},{"kanji":"火","type":"on","reading":"カ","meaning":"fire / Tuesday","example":"火曜日はひまです。","exR":"かようびはひまです。","exE":"I'm free on Tuesdays.","display":"★火★ようびはひまです。"},{"kanji":"水","type":"kun","reading":"みず","meaning":"water / Wednesday","example":"水を飲んでください。","exR":"みずをのんでください。","exE":"Please drink some water.","display":"★水★をのんでください。"},{"kanji":"水","type":"on","reading":"スイ","meaning":"water / Wednesday","example":"水曜日に映画を見ます。","exR":"すいようびにえいがをみます。","exE":"I watch movies on Wednesdays.","display":"★水★ようびにえいがをみます。"},{"kanji":"木","type":"kun","reading":"き","meaning":"tree / Thursday","example":"木の下で休みます。","exR":"きのしたでやすみます。","exE":"I rest under the tree.","display":"★木★のしたでやすみます。"},{"kanji":"木","type":"on","reading":"モク","meaning":"tree / Thursday","example":"木曜日は学校があります。","exR":"もくようびはがっこうがあります。","exE":"There's school on Thursdays.","display":"★木★ようびはがっこうがあります。"},{"kanji":"金","type":"kun","reading":"かね","meaning":"gold / Friday / money","example":"お金がありません。","exR":"おかねがありません。","exE":"I don't have money.","display":"お★金★がありません。"},{"kanji":"金","type":"on","reading":"キン","meaning":"gold / Friday / money","example":"金曜日は友だちと会います。","exR":"きんようびはともだちとあいます。","exE":"I meet friends on Fridays.","display":"★金★ようびはともだちとあいます。"},{"kanji":"土","type":"kun","reading":"つち","meaning":"earth / Saturday","example":"土で作りました。","exR":"つちでつくりました。","exE":"I made it with clay.","display":"★土★でつくりました。"},{"kanji":"土","type":"on","reading":"ド","meaning":"earth / Saturday","example":"土曜日に掃除します。 let currentChapter = "1", currentIndex = 0, isFlipped = false, showingList = false;


function isKanji(ch) {
  const c = ch.charCodeAt(0);
  return (c >= 0x4E00 && c <= 0x9FFF) || (c >= 0x3400 && c <= 0x4DBF);
}
function kata2hira(s) {
  return s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
}
function extractReadings(r) {
  return r.replace(/\([^)]*\)/g,'').split(/[・·]/)
    .map(p => kata2hira(p.trim())).filter(p => p && p !== '—');
}
function makeRuby(kanji, reading) {
  return `<ruby>${kanji}<rt>${reading}</rt></ruby>`;
}
function formatWithFurigana(sentence, fullReading, targetKanji, cardReading, color) {
  const possibleReadings = extractReadings(cardReading);
  const result = [];
  let ri = 0;
  let i = 0;
  while (i < sentence.length) {
    const ch = sentence[i];
    if (!isKanji(ch)) {
      result.push(ch);
      i++;
      while (ri < fullReading.length && fullReading[ri] !== ch) ri++;
      if (ri < fullReading.length) ri++;
    } else {
      // Collect kanji group
      let group = '';
      const groupStart = i;
      while (i < sentence.length && isKanji(sentence[i])) { group += sentence[i]; i++; }
      // Find group reading
      const nextAnchor = i < sentence.length ? sentence[i] : null;
      let groupReading = '';
      const riStart = ri;
      while (ri < fullReading.length && (nextAnchor === null || fullReading[ri] !== nextAnchor)) {
        groupReading += fullReading[ri]; ri++;
      }
      const targetIdx = group.indexOf(targetKanji);
      if (targetIdx < 0) {
        // No target in group: ruby over whole group
        result.push(makeRuby(group, groupReading));
      } else if (group.length === 1) {
        // Only target: show in color
        result.push(`<span style="color:${color};font-weight:700">${group}</span>`);
      } else {
        // Mixed: find target reading position in groupReading
        let trLen = 0, trStart = -1;
        for (const pr of possibleReadings) {
          const idx = groupReading.indexOf(pr);
          if (idx >= 0) { trStart = idx; trLen = pr.length; break; }
        }
        // Handle gemination (e.g., みっ for 三)
        if (trLen > 0 && trStart + trLen < groupReading.length && groupReading[trStart+trLen] === 'っ') {
          if (targetIdx + 1 < group.length || i < sentence.length) trLen++;
        }
        if (trStart >= 0) {
          const bk = group.slice(0, targetIdx);
          const ak = group.slice(targetIdx + 1);
          const br = groupReading.slice(0, trStart);
          const ar = groupReading.slice(trStart + trLen);
          if (bk) result.push(makeRuby(bk, br));
          result.push(`<span style="color:${color};font-weight:700">${targetKanji}</span>`);
          if (ak) result.push(makeRuby(ak, ar));
        } else {
          // Fallback
          result.push(group.replace(targetKanji,
            `<span style="color:${color};font-weight:700">${targetKanji}</span>`));
        }
      }
    }
  }
  return result.join('');
}

function render() {
  const ch = kanjiData[currentChapter];
  const color = colors[currentChapter];
  const card = ch.cards[currentIndex];
  const isKun = card.type === 'kun';

  document.getElementById("chapterGrid").innerHTML = Object.keys(kanjiData).map(k =>
    `<button class="chapter-btn" onclick="changeChapter('${k}')"
      style="background:${k===currentChapter?colors[k]:'#fff'};color:${k===currentChapter?'#fff':colors[k]};border-color:${colors[k]}">
      ${k}章</button>`).join("");

  document.getElementById("chapterTitle").innerHTML =
    `<span style="font-size:18px;font-weight:700;color:${color}">${currentChapter}章</span>
     <span style="font-size:18px;font-weight:700;color:#2d2d2d;margin-left:8px">${ch.title}</span>
     <span style="font-size:14px;color:#aaa;margin-left:8px">${ch.titleEn}</span>`;

  document.getElementById("prevBtn").style.background = color;
  document.getElementById("nextBtn").style.background = color;

  const displayHtml = formatWithFurigana(card.example, card.exR, card.kanji, card.reading, color);

  document.getElementById("cardFront").style.border = `3px solid ${color}`;
  document.getElementById("cardFront").style.background = "#fff";
  document.getElementById("cardFront").innerHTML =
    `<div class="sentence-display">${displayHtml}</div>
     <span class="type-badge ${isKun?'badge-kun':'badge-on'}">${isKun?'Kun 訓':'On 音'}</span>
     <div class="flip-hint">Tap to check the reading ↩</div>`;

  document.getElementById("cardBack").style.background = color;
  document.getElementById("cardBack").innerHTML =
    `<div class="reading-display">${card.exR}</div>
     <div class="divider"></div>
     <div class="readings"><span class="pill">${isKun?'Kun':'On'}: ${card.reading}</span></div>
     <div class="meaning">${card.meaning}</div>
     <div class="ex-en">${card.exE}</div>`;

  document.getElementById("flipInner").className = "flip-inner" + (isFlipped?" flipped":"");

  const total = ch.cards.length;
  document.getElementById("progressText").textContent = `${currentIndex+1} / ${total}`;
  document.getElementById("dots").innerHTML = ch.cards.map((c,i) =>
    `<div class="dot${i===currentIndex?' active':''}"
      style="${i===currentIndex?'background:'+color+';width:18px':'background:#ddd'}"
      onclick="jumpTo(${i})"></div>`).join("");

  const btn = document.getElementById("toggleBtn");
  btn.textContent = showingList ? "Hide list ▲" : "View chapter kanji ▼";
  btn.style.border = `1px solid ${color}`;
  btn.style.color = color;

  document.getElementById("kanjiGrid").style.display = showingList?"flex":"none";
  document.getElementById("kanjiGrid").innerHTML = ch.kanji.map((k,i) => {
    const firstIdx = ch.cards.findIndex(c => c.kanji===k);
    const isCur = ch.cards[currentIndex]&&ch.cards[currentIndex].kanji===k;
    return `<div class="kanji-tile"
      style="background:${isCur?color:'#fff'};color:${isCur?'#fff':color};border-color:${color}"
      onclick="jumpTo(${firstIdx});toggleList()">${k}</div>`;
  }).join("");
}

function changeChapter(ch) { currentChapter=ch; currentIndex=0; isFlipped=false; showingList=false; render(); }
function navigate(dir) { const len=kanjiData[currentChapter].cards.length; currentIndex=(currentIndex+dir+len)%len; isFlipped=false; render(); }
function flipCard() { isFlipped=!isFlipped; document.getElementById("flipInner").className="flip-inner"+(isFlipped?" flipped":""); }
function jumpTo(i) { currentIndex=i; isFlipped=false; render(); }
function toggleList() { showingList=!showingList; render(); }
render();
</script>
</body>
</html>
